appId: ai.lq.donna.desktop
productName: Donna
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/docker-compose.release.yml
    to: docker-compose.release.yml
mac:
  category: public.app-category.productivity
  target:
    - dmg
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Native electron-builder notarization: signs + notarizes + staples BOTH the .app
  # and the .dmg, using APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID from the
  # CI env. This is what makes the downloaded dmg open with no Gatekeeper warning.
  # Automatically skipped on unsigned local builds (no signing identity present).
  notarize: true
dmg:
  title: Install Donna
