appId: ai.lq.donna.desktop
productName: Donna
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/docker-compose.release.yml
    to: docker-compose.release.yml
mac:
  category: public.app-category.productivity
  target:
    - dmg
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
# afterSign notarizes+staples the .app; afterAllArtifactBuild notarizes+staples the
# final .dmg so opening the DMG itself also passes Gatekeeper (no "Apple can't check
# it for malware" warning on download). Both no-op locally without Apple creds.
afterSign: build/notarize.cjs
afterAllArtifactBuild: build/notarize-dmg.cjs
dmg:
  title: Install Donna
